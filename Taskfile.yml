version: "3"

vars:
  SRC: src
  TESTS: tests
  SCRIPTS: scripts

tasks:
  install:
    desc: Install all dependencies including dev
    cmds:
      - uv sync --all-extras

  dev:
    desc: Start dev server with hot reload
    cmds:
      - uv run uvicorn reffie.main:app --reload --host 0.0.0.0 --port 8000

  start:
    desc: Start production server
    cmds:
      - uv run uvicorn reffie.main:app --host 0.0.0.0 --port 8000

  test:
    desc: Run tests with coverage
    cmds:
      - uv run pytest {{.TESTS}} -v

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - uv run pytest {{.TESTS}} -v --tb=short -f

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check {{.SRC}} {{.TESTS}} {{.SCRIPTS}}

  format:
    desc: Run ruff formatter
    cmds:
      - uv run ruff format {{.SRC}} {{.TESTS}} {{.SCRIPTS}}

  format:check:
    desc: Check formatting without writing
    cmds:
      - uv run ruff format --check {{.SRC}} {{.TESTS}} {{.SCRIPTS}}

  typecheck:
    desc: Run pyright type checking
    cmds:
      - uv run pyright

  check:
    desc: Run lint, format check, and typecheck
    cmds:
      - task: lint
      - task: format:check
      - task: typecheck

  fix:
    desc: Auto-fix lint and format issues
    cmds:
      - uv run ruff check --fix {{.SRC}} {{.TESTS}} {{.SCRIPTS}}
      - uv run ruff format {{.SRC}} {{.TESTS}} {{.SCRIPTS}}

  seed:
    desc: Populate the database with demo accounts
    cmds:
      - uv run python -m scripts.seed

  migrate:
    desc: Run pending Alembic migrations
    cmds:
      - uv run alembic upgrade head

  migrate:new:
    desc: Create a new migration (pass MESSAGE="your message")
    cmds:
      - uv run alembic revision --autogenerate -m "{{.MESSAGE}}"

  migrate:down:
    desc: Roll back one migration
    cmds:
      - uv run alembic downgrade -1

  migrate:history:
    desc: Show migration history
    cmds:
      - uv run alembic history --verbose

  ci:
    desc: Full CI check — lint, typecheck, test
    cmds:
      - task: check
      - task: test
