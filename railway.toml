[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uv run alembic upgrade head && uv run uvicorn reffie.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
